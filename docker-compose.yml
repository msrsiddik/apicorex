# ApiCoreX — all-in-one stack.
#
# Brings up the stateless Core plus shared infrastructure (Postgres, Redis).
# The plugin services (identity, sync) are COMMENTED OUT by default so this
# file runs Core on its own. Uncomment them to run the full stack from a single
# compose file — this assumes the plugin repos are cloned as siblings:
#
#   GolandProjects/
#   ├── apicorex/            (this repo — run compose here)
#   ├── apicorex-identity/
#   └── apicorex-sync/
#
# Usage:
#   docker compose up --build          # Core + Postgres + Redis
#   # …then uncomment identity/sync below for the full stack.
#
# Each plugin repo also has its own standalone docker-compose.yml.
#
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: apicorex
      POSTGRES_PASSWORD: apicorex
      POSTGRES_DB: apicorex
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicorex"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: .
    environment:
      HTTP_PORT: ":8080"
      JWT_SECRET: change-me-to-a-long-random-secret
      PLUGIN_API_KEY: change-me-plugin-key
      REDIS_URL: redis://redis:6379/0
      # PLUGIN_ALLOWLIST: identity,sync
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy

  # ── Plugins (uncomment for the full stack) ─────────────────────────────────
  # These build from the sibling repos. The shared values (JWT_SECRET,
  # PLUGIN_API_KEY) MUST match Core's above.
  #
  # identity:
  #   build: ../apicorex-identity
  #   environment:
  #     DATABASE_URL: postgres://apicorex:apicorex@postgres:5432/apicorex?sslmode=disable
  #     JWT_SECRET: change-me-to-a-long-random-secret
  #     PLUGIN_API_KEY: change-me-plugin-key
  #     CORE_URL: http://core:8080
  #     PLUGIN_ADDR: ":50051"
  #     PLUGIN_BASE_URL: http://identity:50051
  #     REDIS_URL: redis://redis:6379/0
  #   ports:
  #     - "50051:50051"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     core:
  #       condition: service_started
  #
  # sync:
  #   build: ../apicorex-sync
  #   environment:
  #     DATABASE_URL: postgres://apicorex:apicorex@postgres:5432/apicorex?sslmode=disable
  #     PLUGIN_API_KEY: change-me-plugin-key
  #     CORE_URL: http://core:8080
  #     PLUGIN_ADDR: ":50052"
  #     PLUGIN_BASE_URL: http://sync:50052
  #   ports:
  #     - "50052:50052"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     core:
  #       condition: service_started

volumes:
  pgdata:
