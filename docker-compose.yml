# ApiCoreX — Core + shared Postgres for the plugins.
#
# Core itself has no database (it's a stateless gateway) — this Postgres
# instance is the SHARED database for the plugins: every plugin (identity,
# sync, zumo-pos, …) connects here, since they read/write per-tenant schemas
# in the same DB. It's exposed on the host as 15432 (not the default 5432) so
# it doesn't collide with a local Postgres. Each plugin repo has its own
# standalone docker-compose.yml that points DATABASE_URL at this same shared
# instance — run this compose file first, then run each plugin repo's compose
# file on its own.
#
# Usage:
#   docker compose up --build
#
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: apicorex
      POSTGRES_PASSWORD: apicorex
      POSTGRES_DB: apicorex
    ports:
      - "15432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apicorex"]
      interval: 5s
      timeout: 3s
      retries: 10

  core:
    build: .
    restart: unless-stopped
    environment:
      HTTP_PORT: ":9999"
      PLUGIN_API_KEY: change-me-plugin-key
      DASHBOARD_SECRET: change-me-dashboard-key
      # PLUGIN_ALLOWLIST: identity,sync
    ports:
      - "9999:9999"

volumes:
  pgdata:
