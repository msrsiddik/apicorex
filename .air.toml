[build]
  cmd = "go build -o ./tmp/apicorex ./cmd/apicorex/main.go"
  entrypoint = "./tmp/apicorex"
  delay = 1000
  exclude_dir = ["tmp", "vendor"]
  include_ext = ["go", "toml", "env"]
  exclude_file = []
  kill_delay = "2s"
  rerun_delay = 500

[log]
  time = true

[color]
  main = "magenta"
  watcher = "cyan"
  build = "yellow"
  runner = "green"

[misc]
  clean_on_exit = true
